services:
  receiver:
    build:
      context: .
    command: ["sh", "-lc", "uvicorn app.main:app --host 0.0.0.0 --port 8080"]
    environment:
      BASIC_AUTH_USERNAME: ${BASIC_AUTH_USERNAME:-user}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-pass}
      YANDEX_OAUTH_TOKEN: ${YANDEX_OAUTH_TOKEN:-dummy}
      YANDEX_API_BASE: ${YANDEX_API_BASE:-http://mock-yandex:8080}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-console}
    ports:
      - "8081:8080"
    depends_on:
      - mock-yandex

  mock-yandex:
    build:
      context: tools/mock_yandex
    environment:
      MOCK_YANDEX_MODE: ${MOCK_YANDEX_MODE:-always_ok}
    ports:
      - "18080:8080"

  alertmanager:
    image: prom/alertmanager:v0.28.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --log.level=info
    volumes:
      - ./tools/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    depends_on:
      - receiver

  alert-generator:
    build:
      context: tools/alert_generator
    environment:
      ALERTMANAGER_URL: http://alertmanager:9093
    depends_on:
      - alertmanager
    profiles:
      - tools

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    volumes:
      - ./tools/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - receiver
      - mock-yandex

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./tools/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./tools/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

